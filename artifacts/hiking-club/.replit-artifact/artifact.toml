kind = "web"
previewPath = "/"
title = "The Hiking Club"
version = "1.0.0"
id = "artifacts/hiking-club"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19307

[services.development]
run = "pnpm --filter @workspace/hiking-club run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hiking-club", "run", "build" ]
publicDir = "artifacts/hiking-club/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19307"
BASE_PATH = "/"
